<form action="formulario" (ngSubmit)="accion()">
    <div>
        <input type="text" name="nombre" formControlName="nombre" placeholder="nombre">
    </div>

    <div>
        <input type="email" name="email" formControlName="email" placeholder="email">
    </div>

    <div>
        <input type="password" name="password" formControlName="password" placeholder="password">
    </div>

    <button [disabled]="!formulario.valid"> LogIn </button>
</form>
